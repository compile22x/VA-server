app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server for drones and GCS
[[services]]
  protocol = "tcp"
  internal_port = 443
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls"]

# UDP proxy GCS side — Mission Planner (UDPCI) connects here
[[services]]
  protocol = "udp"
  internal_port = 15412
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 15412

# UDP proxy drone side — drone streams MAVLink telemetry here
[[services]]
  protocol = "udp"
  internal_port = 15411
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 15411

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
