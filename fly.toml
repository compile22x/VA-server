app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server for drones and GCS (FA-Vertair connects here)
# Using http_service for proper WebSocket upgrade support with Fly TLS termination
[http_service]
  internal_port = 9966
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# UDP services for MAVLink proxy (Mission Planner telemetry)
[[services]]
  protocol = "udp"
  internal_port = 14550
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 14550

[[services]]
  protocol = "udp"
  internal_port = 14551
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 14551

