app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server — http_service handles TLS + HTTP upgrade correctly for WSS clients
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# UDP proxy for Mission Planner (UDPCI connection)
[[services]]
  protocol = "udp"
  internal_port = 15412
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 15412

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
