app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server for drones and GCS (FA-Vertair connects here)
[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
  
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
